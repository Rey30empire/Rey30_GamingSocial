services:
  postgres:
    image: postgres:16-alpine
    container_name: rey30-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rey30
    ports:
      - '5432:5432'
    volumes:
      - rey30-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rey30']
      interval: 5s
      timeout: 5s
      retries: 20

  coturn:
    image: coturn/coturn
    container_name: rey30-coturn
    restart: unless-stopped
    command:
      - -n
      - --listening-port=3478
      - --min-port=56000
      - --max-port=56039
      - --fingerprint
      - --lt-cred-mech
      - --no-cli
      - --no-tls
      - --no-dtls
      - --realm=127.0.0.1
      - --server-name=rey30verse-local-turn
      - --listening-ip=0.0.0.0
      - --relay-ip=0.0.0.0
      - --external-ip=127.0.0.1
      - --user=${RTC_TURN_USERNAME:-rey30turn}:${RTC_TURN_PASSWORD:-rey30turn-secret}
      - --log-file=stdout
      - --verbose
    ports:
      - '3478:3478/tcp'
      - '3478:3478/udp'
      - '56000-56039:56000-56039/tcp'
      - '56000-56039:56000-56039/udp'

volumes:
  rey30-postgres-data:
