name: Visual Smoke

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  visual-smoke:
    name: Playwright visual snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rey30verse
          POSTGRES_PASSWORD: rey30
          POSTGRES_USER: rey30
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rey30 -d rey30verse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rey30:rey30@localhost:5432/rey30verse?schema=public
      DIRECT_URL: postgresql://rey30:rey30@localhost:5432/rey30verse?schema=public
      NEXTAUTH_SECRET: rey30verse-ci-secret
      REY30_DISABLE_AUTH: 'true'
      REY30_ENABLE_RUNTIME_SEED: 'true'
      REY30_PREVIEW_MODE: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare database
        run: npm run db:bootstrap

      - name: Run visual smoke
        run: npm run test:visual

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces and diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/playwright
          if-no-files-found: ignore
